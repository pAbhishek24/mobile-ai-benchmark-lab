name: Dashboard & GitHub Pages

on:
  push:
    branches: [main, phase-3-ai-lab]
    paths:
      - "ai-lab/results/**"
      - "ai-lab/reports/**"
      - "ai-lab/analytics/**"
      - "ai-lab/quality/**"
      - "ai-lab/models/**"
      - "ai-lab/schema/**"
      - "dashboards/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/dashboard.yml"
      - ".github/workflows/ai-lab-ci.yml"
  workflow_run:
    workflows: ["AI Lab CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate:
    name: Generate dashboard artifact
    # Only proceed if:
    # - triggered by workflow_dispatch or push (workflow_run check below)
    # - OR triggered by workflow_run AND AI Lab CI concluded successfully
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dashboard-data.json
        run: python3 ai-lab/analytics/generate_dashboard_data.py

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboards/
          retention-days: 30

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboards/

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
