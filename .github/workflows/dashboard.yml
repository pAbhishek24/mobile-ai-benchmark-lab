name: Dashboard & GitHub Pages

on:
  push:
    branches: [main, phase-3-ai-lab]
    paths:
      - "ai-lab/results/**"
      - "ai-lab/analytics/**"
      - "ai-lab/models/**"
      - "dashboards/**"
      - ".github/workflows/dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate:
    name: Generate dashboard data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dashboard-data.json
        run: python3 ai-lab/analytics/generate_dashboard_data.py

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboards/
          retention-days: 30

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dashboard-data.json
        run: python3 ai-lab/analytics/generate_dashboard_data.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboards/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
